services:
  postgres:
    image: postgres:17-alpine
    container_name: maarkn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: maarkn
      POSTGRES_PASSWORD: maarkn
      POSTGRES_DB: maarkn_dev
    ports:
      - "5432:5432"
    volumes:
      - maarkn-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maarkn -d maarkn_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  maarkn-pg-data:
